
<!DOCTYPE html>
<html>
<head>
<title>WISE5 Analytical Sustainability Platform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

h1 { color: #2c3e50; }

button {
  padding: 10px;
  margin: 5px;
  border: none;
  background: #3498db;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

button:hover { background: #2980b9; }

.box {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 10px;
}

.green { color: green; }
.orange { color: orange; }
.red { color: red; }
</style>
</head>

<body>

<h1>WISE5 Analytical Sustainability Platform</h1>

<button onclick="wise()">WISE-5</button>
<button onclick="synth()">SYNTH-GUARD</button>
<button onclick="compare()">COMPARE</button>
<button onclick="window.print()">Export PDF</button>

<br><br>
<label>Solvent:</label>
<input type="text" id="solvent" placeholder="e.g. methanol">

<input type="file" id="f">
<button onclick="upload()">Upload PDF</button>

<div class="box">
<h3>Results:</h3>
<div id="out"></div>
</div>

<canvas id="chart" width="400" height="200"></canvas>

<script>

const API = "https://186d0b12-3cac-4938-a024-36a4392aea9f-00-bavs8irypmjt.spock.replit.dev";

let chart = null;

// ✅ CHEM21 DATABASE
const solventsDB = {
  "water": "green",
  "ethanol": "green",
  "isopropanol": "green",

  "methanol": "warning",
  "acetonitrile": "warning",

  "hexane": "hazard",
  "toluene": "hazard",
  "chloroform": "hazard"
};

// ✅ solvent scoring
function solventImpact(name){
  let s = solventsDB[name?.toLowerCase()];
  if(s === "green") return 1;
  if(s === "warning") return 0.6;
  if(s === "hazard") return 0.2;
  return 0.7;
}

// 🎨 اللون
function color(score){
  if(score > 0.75) return "green";
  if(score > 0.5) return "orange";
  return "red";
}

// 🧠 summary
function summary(score){
  if(score > 0.75) return "Excellent green analytical method.";
  if(score > 0.5) return "Moderately sustainable method.";
  return "Low sustainability method.";
}

// ✅ عرض
function show(data){

  let baseScore = data.score ?? 0.6;
  let attrs = data.attributes || data;

  let solvent = document.getElementById("solvent").value;
  let solventScore = solventImpact(solvent);

  // ✅ تعديل السكور بناءً على solvent
  let finalScore = (baseScore + solventScore) / 2;

  document.getElementById('out').innerHTML =
    "<b class='"+color(finalScore)+"'>Final Score: "+finalScore.toFixed(2)+"</b><br>" +
    "<i>"+ summary(finalScore) +"</i><br><br>" +

    "<b>Solvent:</b> " + solvent + "<br>" +
    "<b>Class:</b> " + (solventsDB[solvent?.toLowerCase()] || "unknown") + "<br><br>" +

    "<pre>"+JSON.stringify(attrs, null, 2)+"</pre>";

  drawChart(attrs);
}

// ✅ WISE
async function wise(){
  let r = await fetch(API + "/score", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({runtime_min:15})
  });
  show(await r.json());
}

// ✅ SYNTH-GUARD
async function synth(){
  let r = await fetch(API + "/bagi", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({})
  });
  show(await r.json());
}

// ✅ compare
async function compare(){

  let w = await fetch(API + "/score", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({runtime_min:15})
  });

  let s = await fetch(API + "/bagi", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({})
  });

  let wise = await w.json();
  let synth = await s.json();

  document.getElementById('out').innerHTML =
    "<h3>Comparison</h3>" +
    "<b>WISE Score:</b> " + wise.score + "<br>" +
    "<b>SYNTH Score:</b> " + (synth.score ?? "N/A") + "<br><br>";
}

// ✅ upload
async function upload(){
  let file = document.getElementById("f").files[0];
  let form = new FormData();
  form.append("file", file);

  let r = await fetch(API + "/extract-and-score", {
    method: "POST",
    body: form
  });

  show(await r.json());
}

// ✅ chart
function drawChart(attr){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'radar',
    data: {
      labels: Object.keys(attr),
      datasets: [{
        label: 'Metrics',
        data: Object.values(attr),
        backgroundColor: 'rgba(52,152,219,0.2)',
        borderColor: '#3498db'
      }]
    }
  });
}

</script>

</body>
</html>

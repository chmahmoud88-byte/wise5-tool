
<!DOCTYPE html>
<html>
<head>
<title>WISE5 Analytical Sustainability Platform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

h1 {
  color: #2c3e50;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  background: #3498db;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #2980b9;
}

.box {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 10px;
}

.green { color: green; }
.orange { color: orange; }
.red { color: red; }
</style>

</head>

<body>

<h1>WISE5 Analytical Sustainability Platform</h1>

<button onclick="wise()">WISE-5</button>
<button onclick="synth()">SYNTH-GUARD</button>
<button onclick="compare()">COMPARE</button>
<button onclick="window.print()">Export PDF</button>

<input type="file" id="f">
<button onclick="upload()">Upload PDF</button>

<div class="box">
<h3>Results:</h3>
<div id="out"></div>
</div>

<canvas id="chart" width="400" height="200"></canvas>

<script>

const API = "https://186d0b12-3cac-4938-a024-36a4392aea9f-00-bavs8irypmjt.spock.replit.dev";

let chart = null;

// 🎨 color logic
function color(score){
  if(score > 0.75) return "green";
  if(score > 0.5) return "orange";
  return "red";
}

// 🧠 scientific summary
function summary(score){
  if(score > 0.75) return "Excellent green analytical method.";
  if(score > 0.5) return "Moderately sustainable method.";
  return "Low sustainability method.";
}

// 📊 display result
function show(data){

  let score = data.score ?? null;
  let attrs = data.attributes || data;

  document.getElementById('out').innerHTML =
    "<b class='"+color(score || 0)+"'>Score: "+(score ?? "N/A")+"</b><br>" +
    "<i>"+ summary(score || 0) +"</i><br><br>" +
    "<pre>"+JSON.stringify(attrs, null, 2)+"</pre>";

  drawChart(attrs);
}

// ✅ WISE
async function wise(){
  let r = await fetch(API + "/score", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({runtime_min:15})
  });
  show(await r.json());
}

// ✅ SYNTH-GUARD (بديل BAGI)
async function synth(){
  let r = await fetch(API + "/bagi", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({})
  });
  show(await r.json());
}

// ✅ upload
async function upload(){
  let file = document.getElementById("f").files[0];
  let form = new FormData();
  form.append("file", file);

  let r = await fetch(API + "/extract-and-score", {
    method: "POST",
    body: form
  });

  show(await r.json());
}

// ✅ compare
async function compare(){

  let w = await fetch(API + "/score", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({runtime_min:15})
  });

  let s = await fetch(API + "/bagi", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({})
  });

  let wise = await w.json();
  let synth = await s.json();

  document.getElementById('out').innerHTML =
    "<h3>Comparison</h3>" +
    "<b>WISE Score:</b> " + wise.score + "<br>" +
    "<b>SYNTH-GUARD Score:</b> " + (synth.score ?? "N/A") + "<br><br>" +
    "<pre>" + JSON.stringify({WISE:wise, SYNTH:synth}, null, 2) + "</pre>";
}

// 📈 chart
function drawChart(attr){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'radar',
    data: {
      labels: Object.keys(attr),
      datasets: [{
        label: 'Metrics',
        data: Object.values(attr),
        backgroundColor: 'rgba(52,152,219,0.2)',
        borderColor: '#3498db'
      }]
    },
    options: {
      scales: {
        r: {
          min: 0,
          max: 1
        }
      }
    }
  });
}

</script>

</body>
</html>

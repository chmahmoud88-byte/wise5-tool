
<!DOCTYPE html>
<html>
<head>
<title>WISE5 Analytical Sustainability Platform</title>

<!-- ✅ Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chartrc="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js
<!-- ✅ PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

h1 { color: #2c3e50; }

button {
  padding: 10px;
  margin: 5px;
  border: none;
  background: #3498db;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

button:hover { background: #2980b9; }

.box {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 10px;
}

.green { color: green; }
.orange { color: orange; }
.red { color: red; }
</style>
</head>

<body>

<h1>WISE5 Analytical Sustainability Platform</h1>

<button onclick="wise()">WISE-5</button>
<button onclick="synth()">SYNTH-GUARD</button>
<button onclick="compare()">COMPARE</button>
<button onclick="exportPDF()">Export PDF</button>
<button onclick="exportComparePDF()">Comparison Report</button>

<br><br>

<label>Solvent:</label>
<input type="text" id="solvent" placeholder="e.g. methanol">

<input type="file" id="f">
<button onclick="upload()">Upload PDF</button>

<div class="box">
<h3>Results:</h3>
<div id="out"></div>
</div>

<canvas id="chart" width="400" height="200"></canvas>

<script>

const API = "https://186d0b12-3cac-4938-a024-36a4392aea9f-00-bavs8irypmjt.spock.replit.dev";

let chart = null;

// ✅ CHEM21 Database
const solventsDB = {
  "water": {class:"recommended", score:1},
  "ethanol": {class:"recommended", score:1},
  "acetone": {class:"recommended", score:0.9},

  "methanol": {class:"problematic", score:0.6},
  "acetonitrile": {class:"problematic", score:0.6},

  "hexane": {class:"hazardous", score:0.2},
  "toluene": {class:"hazardous", score:0.2},
  "chloroform": {class:"hazardous", score:0.1}
};

// ✅ safe average (no NaN)
function average(obj){
  let v = Object.values(obj).filter(x => typeof x === "number");
  if(v.length === 0) return 0.6;
  return v.reduce((a,b)=>a+b,0) / v.length;
}

// ✅ solvent
function solventImpact(name){
  let s = solventsDB[name?.toLowerCase()];
  return s ? s.score : 0.7;
}

// ✅ color
function color(score){
  if(score > 0.75) return "green";
  if(score > 0.5) return "orange";
  return "red";
}

// ✅ AI discussion (ذكي)
function aiDiscussion(score, attrs){

  let keys = Object.keys(attrs);
  let values = Object.values(attrs);

  let max = keys[values.indexOf(Math.max(...values))];
  let min = keys[values.indexOf(Math.min(...values))];

  return `
This method shows ${score > 0.75 ? "high" : score > 0.5 ? "moderate" : "low"} sustainability.

Best performance in: ${max}
Weakest in: ${min}

Overall evaluation is based on WISE5 and green chemistry principles.
`;
}

// ✅ draw chart
function drawChart(attr){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'radar',
    data: {
      labels: Object.keys(attr),
      datasets: [{
        label: 'Metrics',
        data: Object.values(attr),
        backgroundColor: 'rgba(52,152,219,0.2)',
        borderColor: '#3498db'
      }]
    }
  });
}

// ✅ show results
function show(data){

  let attrs = data.attributes || data;
  let base = data.score ?? average(attrs);

  let solvent = document.getElementById("solvent").value;
  let solScore = solventImpact(solvent);

  let final = (base + solScore)/2;

  document.getElementById("out").innerHTML =
    "<b class='"+color(final)+"'>Final Score: "+final.toFixed(2)+"</b><br>" +

    "<b>Solvent:</b> "+(solvent || "None")+"<br>" +
    "<b>Class:</b> "+(solventsDB[solvent?.toLowerCase()]?.class || "unknown")+"<br><br>" +

    "<b>AI Discussion:</b><br>" + aiDiscussion(final, attrs) + "<br><br>" +

    "<pre>"+JSON.stringify(attrs, null, 2)+"</pre>";

  drawChart(attrs);
}

// ✅ WISE
async function wise(){
  let r = await fetch(API + "/score", {
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({runtime_min:15})
  });
  show(await r.json());
}

// ✅ SYNTH
async function synth(){
  let r = await fetch(API + "/bagi", {
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({})
  });
  show(await r.json());
}

// ✅ compare
async function compare(){

  let w = await fetch(API + "/score", {method:"POST"});
  let s = await fetch(API + "/bagi", {method:"POST"});

  let wise = await w.json();
  let synth = await s.json();

  let wA = wise.attributes || wise;
  let sA = synth.attributes || synth;

  let wScore = average(wA);

  document.getElementById("out").innerHTML =
    "<h3>Comparison</h3>" +
    "<b>WISE:</b> "+wScore.toFixed(2)+"<br>" +
    "<b>SYNTH:</b> "+(synth.score ?? "N/A")+"<br>";

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:'radar',
    data:{
      labels:Object.keys(wA),
      datasets:[
        {label:"WISE", data:Object.values(wA), borderColor:"green"},
        {label:"SYNTH", data:Object.values(sA), borderColor:"red"}
      ]
    }
  });
}

// ✅ upload + auto detect
function detectSolvent(text){
  let t = text.toLowerCase();
  for(let s in solventsDB){
    if(t.includes(s)) return s;
  }
  return "";
}

async function upload(){

  let file = document.getElementById("f").files[0];

  let form = new FormData();
  form.append("file", file);

  let r = await fetch(API + "/extract-and-score", {
    method:"POST",
    body: form
  });

  let data = await r.json();

  let detected = detectSolvent(JSON.stringify(data));
  if(detected){
    document.getElementById("solvent").value = detected;
  }

  show(data);
}

// ✅ PDF
function exportPDF(){

  let content = document.getElementById("out").innerHTML;
  let img = document.getElementById("chart").toDataURL();

  let html = `
    <h1 style="text-align:center">WISE5 Report</h1>
    ${content}
    <img src="${img}"ML = html;

  html2pdf().from(el).save("Report.pdf");
}

// ✅ comparison PDF
async function exportComparePDF(){

  let w = await fetch(API + "/score", {method:"POST"});
  let s = await fetch(API + "/bagi", {method:"POST"});

  let wise = await w.json();
  let synth = await s.json();

  let wScore = average(wise.attributes || wise);

  let html = `
    <h1 style="text-align:center">Comparison Report</h1>
    <p>WISE: ${wScore.toFixed(2)}</p>
    <p>SYNTH: ${synth.score ?? "N/A"}</p>
  `;

  let el = document.createElement("div");
  el.innerHTML = html;

  html2pdf().from(el).save("Comparison.pdf");
}

</script>

</body>
</html>

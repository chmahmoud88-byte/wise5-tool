
<!DOCTYPE html>
<html>
<head>
<title>WISE5 PRO</title>
</head>
<body>
<h1>WISE5 PRO</h1>
<button onclick='wise()'>WISE-5</button>
<button onclick='bagi()'>BAGI</button>
<input type='file' id='f'>
<button onclick='upload()'>Upload PDF</button>
<pre id='out'></pre>
<script>
async function wise(){
let r=await fetch('http://127.0.0.1:8000/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({runtime_min:15})});
document.getElementById('out').innerText=await r.text();}

async function bagi(){
let r=await fetch('http://127.0.0.1:8000/bagi',{method:'POST'});
document.getElementById('out').innerText=await r.text();}

async function upload(){
let f=document.getElementById('f').files[0];
let form=new FormData();form.append('file',f);
let r=await fetch('http://127.0.0.1:8000/extract-and-score',{method:'POST',body:form});
document.getElementById('out').innerText=await r.text();}
</script>
</body>
</html>
